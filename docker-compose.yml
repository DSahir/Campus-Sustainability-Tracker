version: '3.9'

services:
  db:
    image: postgres:15
    container_name: sustainability_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sustainability
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: backend_app
    depends_on:
      - db
    ports:
      - "8000:8000"